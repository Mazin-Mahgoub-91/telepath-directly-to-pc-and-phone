<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Telepath by Motion v1 ( eye-blink )</title>
<style>
body{background:#000;color:#0ff;font-family:arial;margin:0;padding:15px;text-align:center}
h1{color:#0ff;margin:5px 0;font-size:24px}
#info{color:#ff0;font-size:15px;margin:8px}
#mainContainer{display:flex;gap:15px;justify-content:center;align-items:flex-start;flex-wrap:wrap}
#videoContainer{position:relative;width:480px;height:360px;border:3px solid #0ff}
video, canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
#qamoos{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:280px}
.letter{border:1px solid #0ff;padding:8px;font-size:18px;background:#001}
.letter.active{background:#0ff;color:#000}
#rightPanel{display:flex;flex-direction:column;gap:10px}
#output{font-size:24px;border:2px solid #0ff;min-height:80px;padding:10px;text-align:right;background:#011;color:#0f0;width:480px;word-wrap:break-word;overflow:hidden}
#status{font-size:16px;margin:5px;color:#0f0}
#blinkCount{font-size:18px;color:#ff0}
#startBtn{background:#0ff;color:#000;border:none;padding:12px 30px;font-size:18px;cursor:pointer;margin:10px}
#controls{background:#011;border:2px solid #0ff;padding:10px;margin:10px auto;width:480px}
</style>
</head>
<body>
<h1>Telepath by Motion v1 ( eye-blink )</h1>
<div id="info">رمشة = حرف | رمشتين = مسافة | المسافة المثالية 40سم</div>

<button id="startBtn">شغل الكاميرا</button>
<div id="status">اضغط عشان تبدأ</div>
<div id="blinkCount">الرمشات: 0</div>

<div id="controls" style="display:none">
  <label style="color:#ff0">حساسية: </label>
  <input type="range" id="slider" min="5" max="40" value="8">
  <span id="val" style="color:#0f0;font-size:20px">8</span>
  <div id="distInfo" style="color:#ff0;font-size:14px;margin-top:5px">المسافة: -- سم</div>
</div>

<div id="mainContainer">
  <div id="qamoos"></div>
  <div id="rightPanel">
    <div id="videoContainer">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div id="output"></div>
  </div>
</div>

<script>
var letters = ['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'];
var v = document.getElementById('video');
var c = document.getElementById('canvas');
var ctx = c.getContext('2d');
var idx = 0;
var text = '';
var scanning = true;
var timer = null;
var last = null;
var threshold = 8;
var cooldown = 0;
var blinkTime = 0;
var blinkCount = 0;

// بناء الحروف
var q = document.getElementById('qamoos');
for(var i=0; i<letters.length; i++) {
  var d = document.createElement('div');
  d.className = 'letter';
  d.innerHTML = letters[i];
  d.id = 'l'+i;
  q.appendChild(d);
}

document.getElementById('slider').oninput = function() {
  threshold = parseInt(this.value);
  document.getElementById('val').innerHTML = threshold;
}

function highlight() {
  for(var i=0; i<letters.length; i++) document.getElementById('l'+i).className = 'letter';
  document.getElementById('l'+idx).className = 'letter active';
}

function pick() {
  text += letters[idx];
  document.getElementById('output').innerHTML = text;
  blinkCount++;
  document.getElementById('blinkCount').innerHTML = 'الرمشات: ' + blinkCount;
  scanning = false;
  setTimeout(function(){scanning=true; next(); reset();}, 1200);
}

function next() {
  idx = (idx+1) % letters.length;
  highlight();
}

function reset() {
  clearInterval(timer);
  timer = setInterval(next, 3000);
}

function checkBlink() {
  ctx.drawImage(v, 0, 0, c.width, c.height);
  var frame = ctx.getImageData(0, 0, c.width, c.height);

  if(!last) {last = frame; return;}

  // Back-end تعديل 1: نكبر مناطق العيون + نعتمد على العين الواضحة
  var eyeW = c.width * 0.18; // كبرناها عشان 70سم
  var eyeH = c.height * 0.18;
  var rx = c.width * 0.22;
  var ry = c.height * 0.30;
  var lx = c.width * 0.60;
  var ly = c.height * 0.30;

  function getBlinkScore(x, y, w, h) {
    var darkPixels = 0;
    var total = 0;
    for(var i=y; i<y+h; i+=2) {
      for(var j=x; j<x+w; j+=2) {
        var p = (i*c.width + j)*4;
        var r = frame.data[p];
        var g = frame.data[p+1];
        var b = frame.data[p+2];
        var brightness = (r+g+b)/3;

        var lp = (i*c.width + j)*4;
        var lr = last.data[lp];
        var lg = last.data[lp+1];
        var lb = last.data[lp+2];
        var lastBright = (lr+lg+lb)/3;

        // لو البكسل اسود شديد فجأة = الجفن نزل
        if(lastBright > 80 && brightness < 40) {
          darkPixels++;
        }
        total++;
      }
    }
    return (darkPixels / total) * 100; // نسبة البكسلات الاسودت
  }

  var rightScore = getBlinkScore(rx, ry, eyeW, eyeH);
  var leftScore = getBlinkScore(lx, ly, eyeW, eyeH);
  var avg = Math.max(rightScore, leftScore); // العين الواحدة كفاية

  // Back-end تعديل 2: حساب المسافة بدون nan نهائي
  var eyeDistance = Math.abs(rx - lx); // المسافة بين العين بالبكسل
  var estimatedDist = 1200 / (eyeDistance + 0.1); // +0.1 عشان ما نقسم على صفر
  if(!isFinite(estimatedDist)) estimatedDist = 50; // لو خربت نديها قيمة وسط
  document.getElementById('distInfo').innerHTML = 'المسافة: ' + Math.round(estimatedDist) + ' سم';

  // Back-end تعديل 3: نشتغل من 35سم لحد 75سم. مافي حظر
  var inRange = estimatedDist > 30 && estimatedDist < 75;

  last = frame;

  // Back-end تعديل 4: الحساسية تتناسب مع المسافة. كل ما بعدت الحساسية تزيد
  var dynamicThreshold = threshold * (estimatedDist / 40);

  if(avg > dynamicThreshold && cooldown == 0 && inRange) {
    cooldown = 10;
    var now = Date.now();

    // الرمشتين
    if(now - blinkTime < 400) {
      text += ' ';
      document.getElementById('output').innerHTML = text;
    } else if(scanning) {
      pick();
    }
    blinkTime = now;
  }

  if(cooldown > 0) cooldown--;
}

function loop() {
  if(v.readyState >= 2) checkBlink();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick = function() {
  this.style.display = 'none';
  document.getElementById('status').innerHTML = 'الكاميرا شغالة - من 35سم ل 75سم';
  document.getElementById('controls').style.display = 'block';

  navigator.mediaDevices.getUserMedia({video:true})
.then(function(s) {
    v.srcObject = s;
    v.onloadedmetadata = function() {
      c.width = 480;
      c.height = 360;
      v.play();
      highlight();
      reset();
      loop();
    };
  })
.catch(function(e) {
    document.getElementById('status').innerHTML = 'خطأ: ' + e.message;
  });
}
</script>
</body>
</html>
