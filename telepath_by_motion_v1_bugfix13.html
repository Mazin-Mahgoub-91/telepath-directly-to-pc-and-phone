<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Telepath by Motion v1 ( eye-blink )</title>
<style>
body{background:#000;color:#0ff;font-family:arial;margin:0;padding:15px;text-align:center}
h1{color:#0ff;margin:5px 0;font-size:24px}
#info{color:#ff0;font-size:15px;margin:8px}
#tips{color:#0f0;font-size:14px;margin:5px;background:#011;padding:8px;border:1px solid #0f0}
#mainContainer{display:flex;gap:15px;justify-content:center;align-items:flex-start;flex-wrap:wrap}
#videoContainer{position:relative;width:480px;height:360px;border:3px solid #0ff}
video, canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
#qamoos{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:280px}
.letter{border:1px solid #0ff;padding:8px;font-size:18px;background:#001}
.letter.active{background:#0ff;color:#000}
#rightPanel{display:flex;flex-direction:column;gap:10px}
#output{font-size:24px;border:2px solid #0ff;min-height:80px;padding:10px;text-align:right;background:#011;color:#0f0;width:480px;word-wrap:break-word;overflow-wrap:break-word}
#status{font-size:16px;margin:5px;color:#0f0}
#blinkCount{font-size:18px;color:#ff0}
#startBtn{background:#0ff;color:#000;border:none;padding:12px 30px;font-size:18px;cursor:pointer;margin:10px}
#controls{background:#011;border:2px solid #0ff;padding:10px;margin:10px auto;width:480px}
</style>
</head>
<body>
<h1>Telepath by Motion v1 ( eye-blink )</h1>
<div id="info">رمشة = حرف | رمشتين = مسافة</div>

<div id="tips">
* قرب وجهك للكاميرا + اضاءة جيدة<br>
* درجة الحساسية الجيدة المحتملة هي ٨ او ١٥
</div>

<button id="startBtn">شغل الكاميرا</button>
<div id="status">اضغط عشان تبدأ</div>
<div id="blinkCount">الرمشات: 0</div>

<div id="controls" style="display:none">
  <label style="color:#ff0">حساسية: </label>
  <input type="range" id="slider" min="5" max="40" value="15">
  <span id="val" style="color:#0f0;font-size:20px">15</span>
</div>

<div id="mainContainer">
  <div id="qamoos"></div>
  <div id="rightPanel">
    <div id="videoContainer">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div id="output"></div>
  </div>
</div>

<script>
var letters = ['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'];
var v = document.getElementById('video');
var c = document.getElementById('canvas');
var ctx = c.getContext('2d');
var idx = 0;
var text = '';
var scanning = true;
var timer = null;
var last = null;
var threshold = 15;
var cooldown = 0;
var blinkTime = 0;
var blinkCount = 0;

// بناء الحروف
var q = document.getElementById('qamoos');
for(var i=0; i<letters.length; i++) {
  var d = document.createElement('div');
  d.className = 'letter';
  d.innerHTML = letters[i];
  d.id = 'l'+i;
  q.appendChild(d);
}

document.getElementById('slider').oninput = function() {
  threshold = parseInt(this.value);
  document.getElementById('val').innerHTML = threshold;
}

function highlight() {
  for(var i=0; i<letters.length; i++) document.getElementById('l'+i).className = 'letter';
  document.getElementById('l'+idx).className = 'letter active';
}

function pick() {
  text += letters[idx];
  document.getElementById('output').innerHTML = text;
  blinkCount++;
  document.getElementById('blinkCount').innerHTML = 'الرمشات: ' + blinkCount;
  scanning = false;
  setTimeout(function(){scanning=true; next(); reset();}, 1200);
}

function next() {
  idx = (idx+1) % letters.length;
  highlight();
}

function reset() {
  clearInterval(timer);
  timer = setInterval(next, 3000);
}

function checkBlink() {
  ctx.drawImage(v, 0, 0, c.width, c.height);
  var frame = ctx.getImageData(0, 0, c.width, c.height);

  if(!last) {last = frame; return;}

  var x1 = c.width * 0.2;
  var y1 = c.height * 0.3;
  var w1 = c.width * 0.25;
  var h1 = c.height * 0.25;

  var x2 = c.width * 0.55;
  var y2 = c.height * 0.3;
  var w2 = c.width * 0.25;
  var h2 = c.height * 0.25;

  function getDiff(x, y, w, h) {
    var diff = 0, count = 0;
    for(var i=y; i<y+h; i+=4) {
      for(var j=x; j<x+w; j+=4) {
        var p = (i*c.width + j)*4;
        diff += Math.abs(frame.data[p] - last.data[p]);
        count++;
      }
    }
    return diff / count;
  }

  var diff1 = getDiff(x1, y1, w1, h1);
  var diff2 = getDiff(x2, y2, w2, h2);
  var avg = Math.max(diff1, diff2);

  last = frame;

  if(avg > threshold) {
    var now = Date.now();

    // التعديل: 500ms بدل 400ms عشان الرمشتين
    if(now - blinkTime < 500 && now - blinkTime > 50) {
      text += ' ';
      document.getElementById('output').innerHTML = text;
      blinkTime = 0;
      cooldown = 15;
    }
    else if(cooldown == 0 && scanning) {
      pick();
      cooldown = 15;
    }

    blinkTime = now;
  }

  if(cooldown > 0) cooldown--;
}

function loop() {
  if(v.readyState >= 2) checkBlink();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick = function() {
  this.style.display = 'none';
  document.getElementById('status').innerHTML = 'الكاميرا شغالة';
  document.getElementById('controls').style.display = 'block';

  navigator.mediaDevices.getUserMedia({video:true})
.then(function(s) {
    v.srcObject = s;
    v.onloadedmetadata = function() {
      c.width = 480;
      c.height = 360;
      v.play();
      highlight();
      reset();
      loop();
    };
  })
.catch(function(e) {
    document.getElementById('status').innerHTML = 'خطأ: ' + e.message;
  });
}
</script>
</body>
</html>
