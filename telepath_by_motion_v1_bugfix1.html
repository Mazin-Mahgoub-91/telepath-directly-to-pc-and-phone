<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Telepath by Motion v1</title>
<style>
body{background:#000;color:#0ff;font-family:arial;margin:0;padding:20px;text-align:center}
h1{color:#0ff;margin-bottom:10px}
#info{color:#ff0;font-size:18px;margin:10px}
#videoContainer{position:relative;width:640px;height:480px;margin:20px auto;border:3px solid #0ff}
video, canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
#qamoos{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;max-width:800px;margin:20px auto}
.letter{border:2px solid #0ff;padding:18px;font-size:28px;background:#001}
.letter.active{background:#0ff;color:#000}
#output{margin-top:30px;font-size:32px;border:3px solid #0ff;min-height:120px;padding:20px;text-align:right;background:#011;color:#0f0}
#status{font-size:20px;margin:10px;color:#0f0}
#blinkCount{font-size:24px;color:#ff0}
#startBtn{background:#0ff;color:#000;border:none;padding:15px 40px;font-size:22px;cursor:pointer;margin:20px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>
<h1>Telepath by Motion v1</h1>
<div id="info">رمشة واحدة = اختار الحرف | رمشتين سريع = مسافة | خليك ثابت 3 ثواني = الحرف البعدو</div>
<button id="startBtn">اضغط هنا عشان تشغل الكاميرا</button>
<div id="status">في انتظار تشغيل الكاميرا...</div>
<div id="blinkCount">الرمشات: 0</div>

<div id="videoContainer">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="qamoos"></div>

<div id="output">بعد تشغل الكاميرا ابدأ بالرمش...</div>

<script>
var arabicLetters = ['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'];

var video = document.getElementById('video');
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var qamoosDiv = document.getElementById('qamoos');
var outputDiv = document.getElementById('output');
var statusDiv = document.getElementById('status');
var blinkCountDiv = document.getElementById('blinkCount');
var startBtn = document.getElementById('startBtn');

var currentIndex = 0;
var fullSentence = '';
var blinkCount = 0;
var lastBlinkTime = 0;
var eyeClosed = false;
var scanning = true;
var letterTimer = null;
var faceMesh = null;
var camera = null;

// بناء القاموس
for(var i = 0; i < arabicLetters.length; i++) {
  var div = document.createElement('div');
  div.className = 'letter';
  div.innerHTML = arabicLetters[i];
  div.id = 'letter' + i;
  qamoosDiv.appendChild(div);
}

function highlightLetter() {
  for(var i = 0; i < arabicLetters.length; i++) {
    document.getElementById('letter' + i).className = 'letter';
  }
  document.getElementById('letter' + currentIndex).className = 'letter active';
}

function selectLetter() {
  var chosen = arabicLetters[currentIndex];
  fullSentence = fullSentence + chosen;
  outputDiv.innerHTML = fullSentence;
  blinkCount = blinkCount + 1;
  blinkCountDiv.innerHTML = 'الرمشات: ' + blinkCount;
  scanning = false;
  setTimeout(function() {
    scanning = true;
    nextLetter();
    resetTimer();
  }, 1500);
}

function nextLetter() {
  currentIndex = currentIndex + 1;
  if(currentIndex >= arabicLetters.length) currentIndex = 0;
  highlightLetter();
}

function resetTimer() {
  clearInterval(letterTimer);
  letterTimer = setInterval(nextLetter, 3000);
}

function detectBlink(landmarks) {
  var leftEye = [33, 160, 158, 133, 153, 144];
  var rightEye = [362, 385, 387, 263, 373, 380];
  var leftEAR = getEAR(landmarks, leftEye);
  var rightEAR = getEAR(landmarks, rightEye);
  var avgEAR = (leftEAR + rightEAR) / 2;
  var EAR_THRESHOLD = 0.21;

  if(avgEAR < EAR_THRESHOLD) {
    if(!eyeClosed) {
      eyeClosed = true;
      var now = new Date().getTime();
      if(now - lastBlinkTime < 450) {
        fullSentence = fullSentence + ' ';
        outputDiv.innerHTML = fullSentence;
      } else if(scanning) {
        selectLetter();
      }
      lastBlinkTime = now;
    }
  } else {
    eyeClosed = false;
  }
}

function getEAR(landmarks, eyePoints) {
  var p1 = landmarks[eyePoints[0]];
  var p2 = landmarks[eyePoints[1]];
  var p3 = landmarks[eyePoints[2]];
  var p4 = landmarks[eyePoints[3]];
  var p5 = landmarks[eyePoints[4]];
  var p6 = landmarks[eyePoints[5]];
  var A = Math.sqrt(Math.pow(p2.x - p6.x,2) + Math.pow(p2.y - p6.y,2));
  var B = Math.sqrt(Math.pow(p3.x - p5.x,2) + Math.pow(p3.y - p5.y,2));
  var C = Math.sqrt(Math.pow(p1.x - p4.x,2) + Math.pow(p1.y - p4.y,2));
  return (A + B) / (2.0 * C);
}

function onResults(results) {
  if(video.videoWidth > 0) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if(results.multiFaceLandmarks) {
    for(var k = 0; k < results.multiFaceLandmarks.length; k++) {
      var landmarks = results.multiFaceLandmarks[k];
      detectBlink(landmarks);
      drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, {color: '#00FF00', lineWidth: 1});
    }
    statusDiv.innerHTML = 'الكاميرا شغالة - رمش عشان تكتب';
  }
}

function initCamera() {
  startBtn.style.display = 'none';
  statusDiv.innerHTML = 'جاري طلب إذن الكاميرا...';

  navigator.mediaDevices.getUserMedia({video: true, audio: false})
 .then(function(stream) {
    video.srcObject = stream;
    video.play();

    faceMesh = new FaceMesh({locateFile: function(file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + file;
    }});

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    camera = new Camera(video, {
      onFrame: function() {
        faceMesh.send({image: video});
      },
      width: 640,
      height: 480
    });

    camera.start();
    highlightLetter();
    resetTimer();
  })
 .catch(function(err) {
    statusDiv.innerHTML = 'خطأ: ' + err.message;
    startBtn.style.display = 'block';
  });
}

startBtn.onclick = initCamera;
</script>
</body>
</html>
